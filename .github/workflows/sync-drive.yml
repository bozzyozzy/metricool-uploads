name: Sync Drive media

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-drive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg and rclone
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg rclone jq

      - name: Write service account key
        run: printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}

      - name: Sync each client folder
        run: |
          set -e
          shopt -s nullglob
          count=$(jq length sync-map.json)
          for i in $(seq 0 $((count - 1))); do
            path=$(jq -r ".[$i].path" sync-map.json)
            fid=$(jq -r ".[$i].folder_id" sync-map.json)
            if [ -z "$fid" ] || [ "$fid" = "null" ]; then
              echo "Skipping $path (no folder id set)"
              continue
            fi
            echo "Syncing $path from Drive folder $fid"
            inc="$RUNNER_TEMP/incoming/$path"
            mkdir -p "$inc" "$path"
            rclone copy --drive-service-account-file "$RUNNER_TEMP/sa.json" --drive-root-folder-id "$fid" --drive-acknowledge-abuse --include "*.{mov,MOV,mp4,MP4,m4v,M4V}" ":drive:" "$inc"
            for f in "$inc"/*.[mM][oO][vV] "$inc"/*.[mM]4[vV]; do
              [ -e "$f" ] || continue
              name="$(basename "${f%.*}")"
              ffmpeg -y -i "$f" -c copy -movflags +faststart "$path/${name}.mp4"
            done
            for f in "$inc"/*.[mM][pP]4; do
              [ -e "$f" ] || continue
              cp -n "$f" "$path/$(basename "$f")"
            done
          done

      - name: Commit and push new media
        run: |
          git config user.name "BeeBigger Bot"
          git config user.email "info@beebigger.com"
          git add -- '*.mp4'
          if git diff --staged --quiet; then
            echo "No new media to commit."
          else
            git commit -m "sync: drive media $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
