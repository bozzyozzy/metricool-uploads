name: Sync Drive media

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-drive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg and rclone
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg rclone jq

      - name: Write service account key
        run: printf '%s' "$GDRIVE_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}

      - name: Sync each client folder
        run: |
          count=$(jq length sync-map.json)
          for i in $(seq 0 $((count - 1))); do
            cpath=$(jq -r ".[$i].path" sync-map.json)
            fid=$(jq -r ".[$i].folder_id" sync-map.json)
            fname=$(jq -r ".[$i].file // empty" sync-map.json)
            if [ -z "$fid" ] || [ "$fid" = "null" ]; then
              echo "Skipping $cpath (no folder id set)"
              continue
            fi
            echo "Syncing $cpath from Drive folder $fid (file: ${fname:-all})"
            inc="$RUNNER_TEMP/incoming/$cpath"
            mkdir -p "$inc" "$cpath"
            rc_ok=1
            if [ -n "$fname" ]; then
              rclone copy --drive-service-account-file "$RUNNER_TEMP/sa.json" --drive-root-folder-id "$fid" --drive-acknowledge-abuse --include "$fname" ":drive:" "$inc" || rc_ok=0
            else
              rclone copy --drive-service-account-file "$RUNNER_TEMP/sa.json" --drive-root-folder-id "$fid" --drive-acknowledge-abuse --exclude "*(posted)*/**" ":drive:" "$inc" || rc_ok=0
            fi
            if [ "$rc_ok" = "0" ]; then
              echo "::warning::Could not read Drive folder for $cpath. Skipping."
              continue
            fi
            find "$inc" -type f -print0 2>/dev/null | while IFS= read -r -d '' f; do
              rel="${f#"$inc"/}"
              case "$rel" in *"(posted)"*) continue ;; esac
              ext="${f##*.}"
              base="$(basename "${f%.*}" | tr ' ' '-')"
              out="$cpath/$base.mp4"
              pdir="$cpath/_previews/$base"
              if [ ! -d "$pdir" ]; then
                mkdir -p "$pdir"
                ffmpeg -nostdin -y -i "$f" -vf "fps=1/3,scale=400:-1" -frames:v 8 "$pdir/frame-%02d.jpg" || echo "frames failed: $f"
              fi
              if [ ! -f "$out" ]; then
                case "$ext" in
                  mov|MOV|m4v|M4V) ffmpeg -nostdin -y -i "$f" -c copy -movflags +faststart "$out" || echo "convert failed: $f" ;;
                  mp4|MP4) cp -- "$f" "$out" || echo "copy failed: $f" ;;
                esac
              fi
            done
          done

      - name: Commit and push new media
        run: |
          git config user.name "BeeBigger Bot"
          git config user.email "info@beebigger.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new media to commit."
          else
            git commit -m "sync: drive media $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
